name: CI and Deploy to Server

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "frontend/**"
      - "alembic/**"
      - "Dockerfile"
      - "docker-entrypoint.sh"
      - "docker-compose.yml"
      - "wait-for-db.sh"
      - "start-*.sh"
      - "pyproject.toml"
      - "uv.lock"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: socialsync
        options: >-
          --health-cmd "pg_isready -U postgres -d socialsync"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install backend dependencies
        run: uv sync --dev

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/socialsync
          REDIS_URL: redis://localhost:6379/0
          ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          BACKEND_PUBLIC_URL: http://127.0.0.1:8000
          FRONTEND_URL: http://localhost:3000
          AUTH_REQUIRED: "false"
          FACEBOOK_CLIENT_ID: ci
          FACEBOOK_SECRET: ci
          LINKEDIN_CLIENT_ID: ci
          LINKEDIN_SECRET: ci
          GOOGLE_CLIENT_ID: ci
          GOOGLE_SECRET: ci
          TWITTER_CLIENT_ID: ci
          TWITTER_CLIENT_SECRET: ci
          CLOUDINARY_CLOUD_NAME: ci
          CLOUDINARY_API_KEY: ci
          CLOUDINARY_API_SECRET: ci
        run: uv run alembic upgrade head

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/socialsync
          REDIS_URL: redis://localhost:6379/0
          ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          BACKEND_PUBLIC_URL: http://127.0.0.1:8000
          FRONTEND_URL: http://localhost:3000
          AUTH_REQUIRED: "false"
          FACEBOOK_CLIENT_ID: ci
          FACEBOOK_SECRET: ci
          LINKEDIN_CLIENT_ID: ci
          LINKEDIN_SECRET: ci
          GOOGLE_CLIENT_ID: ci
          GOOGLE_SECRET: ci
          TWITTER_CLIENT_ID: ci
          TWITTER_CLIENT_SECRET: ci
          CLOUDINARY_CLOUD_NAME: ci
          CLOUDINARY_API_KEY: ci
          CLOUDINARY_API_SECRET: ci
        run: uv run pytest tests -q

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
          NEXT_PUBLIC_TENANT_ID: tenant_123
        run: npm run build

  deploy:
    name: Deploy App Stack
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          command_timeout: 45m
          script: |
            set -e
            cd /home/abm-admin1/Connect

            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            docker compose -f docker-compose.server.yml down
            docker compose -f docker-compose.server.yml build --no-cache
            docker compose -f docker-compose.server.yml up -d

            docker exec socialsync_backend sh -lc 'uv run alembic upgrade head'

            cd /home/abm-admin1/Connect/frontend
            npm ci
            npm run build
            pm2 restart socialsync-frontend
            pm2 save

            docker compose -f /home/abm-admin1/Connect/docker-compose.server.yml ps
            docker logs socialsync_backend --tail=50
            docker logs socialsync_worker --tail=50
            curl -fsS http://127.0.0.1/api/v1/openapi.json > /dev/null
