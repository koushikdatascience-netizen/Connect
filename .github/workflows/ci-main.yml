name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: socialsync
        options: >-
          --health-cmd "pg_isready -U postgres -d socialsync"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/zipball/${{ github.sha }}" \
            -o repo.zip
          python3 - <<'PY'
          import os
          import shutil
          import zipfile

          workspace = os.getcwd()
          extract_dir = os.path.join(workspace, "repo_src")

          with zipfile.ZipFile("repo.zip") as archive:
              archive.extractall(extract_dir)

          [root_name] = os.listdir(extract_dir)
          root = os.path.join(extract_dir, root_name)

          for name in os.listdir(root):
              src = os.path.join(root, name)
              dst = os.path.join(workspace, name)
              if os.path.isdir(dst) and not os.path.islink(dst):
                  shutil.rmtree(dst)
              elif os.path.exists(dst):
                  os.remove(dst)
              shutil.move(src, dst)

          shutil.rmtree(extract_dir)
          os.remove("repo.zip")
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install uv
        run: python -m pip install uv

      - name: Install backend dependencies
        run: uv sync --dev

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/socialsync
          REDIS_URL: redis://localhost:6379/0
          ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          BACKEND_PUBLIC_URL: http://127.0.0.1:8000
          FRONTEND_URL: http://localhost:3000
          AUTH_REQUIRED: "false"
          ALLOW_DEV_TENANT_HEADER: "true"
          FACEBOOK_CLIENT_ID: ci
          FACEBOOK_SECRET: ci
          LINKEDIN_CLIENT_ID: ci
          LINKEDIN_SECRET: ci
          GOOGLE_CLIENT_ID: ci
          GOOGLE_SECRET: ci
          TWITTER_CLIENT_ID: ci
          TWITTER_CLIENT_SECRET: ci
          CLOUDINARY_CLOUD_NAME: ci
          CLOUDINARY_API_KEY: ci
          CLOUDINARY_API_SECRET: ci
        run: uv run alembic upgrade head

      - name: Start API
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/socialsync
          REDIS_URL: redis://localhost:6379/0
          ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          BACKEND_PUBLIC_URL: http://127.0.0.1:8000
          FRONTEND_URL: http://localhost:3000
          AUTH_REQUIRED: "false"
          ALLOW_DEV_TENANT_HEADER: "true"
          FACEBOOK_CLIENT_ID: ci
          FACEBOOK_SECRET: ci
          LINKEDIN_CLIENT_ID: ci
          LINKEDIN_SECRET: ci
          GOOGLE_CLIENT_ID: ci
          GOOGLE_SECRET: ci
          TWITTER_CLIENT_ID: ci
          TWITTER_CLIENT_SECRET: ci
          CLOUDINARY_CLOUD_NAME: ci
          CLOUDINARY_API_KEY: ci
          CLOUDINARY_API_SECRET: ci
        run: |
          nohup uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/api/v1/health >/dev/null; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          echo "API failed to start"
          cat uvicorn.log
          exit 1

      - name: Run backend tests
        env:
          ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/socialsync
          REDIS_URL: redis://localhost:6379/0
          BACKEND_PUBLIC_URL: http://127.0.0.1:8000
          FRONTEND_URL: http://localhost:3000
          AUTH_REQUIRED: "false"
          ALLOW_DEV_TENANT_HEADER: "true"
          API_BASE_URL: http://127.0.0.1:8000
          API_TENANT_ID: tenant_123
          FACEBOOK_CLIENT_ID: ci
          FACEBOOK_SECRET: ci
          LINKEDIN_CLIENT_ID: ci
          LINKEDIN_SECRET: ci
          GOOGLE_CLIENT_ID: ci
          GOOGLE_SECRET: ci
          TWITTER_CLIENT_ID: ci
          TWITTER_CLIENT_SECRET: ci
          CLOUDINARY_CLOUD_NAME: ci
          CLOUDINARY_API_KEY: ci
          CLOUDINARY_API_SECRET: ci
        run: uv run pytest tests -q

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/zipball/${{ github.sha }}" \
            -o repo.zip
          python3 - <<'PY'
          import os
          import shutil
          import zipfile

          workspace = os.getcwd()
          extract_dir = os.path.join(workspace, "repo_src")

          with zipfile.ZipFile("repo.zip") as archive:
              archive.extractall(extract_dir)

          [root_name] = os.listdir(extract_dir)
          root = os.path.join(extract_dir, root_name)

          for name in os.listdir(root):
              src = os.path.join(root, name)
              dst = os.path.join(workspace, name)
              if os.path.isdir(dst) and not os.path.islink(dst):
                  shutil.rmtree(dst)
              elif os.path.exists(dst):
                  os.remove(dst)
              shutil.move(src, dst)

          shutil.rmtree(extract_dir)
          os.remove("repo.zip")
          PY

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
        run: |
          rm -rf .next .next_previous
          mkdir -p public
          printf '%s\n' "${GITHUB_SHA}" > public/deploy-version.txt
          npm run build
