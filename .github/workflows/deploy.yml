name: 🚀 Deploy (Zero Downtime + Rollback)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🔐 Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}

          script: |
            set -e

            echo "===================================="
            echo "🚀 DEPLOY STARTED"
            echo "===================================="

            cd ~/Connect

            echo "📌 Saving current commit..."
            PREV_COMMIT=$(git rev-parse HEAD)
            echo "Previous: $PREV_COMMIT"

            echo "📥 Pull latest code..."
            git fetch origin
            git reset --hard origin/main

            echo "📦 FRONTEND BUILD..."
            cd frontend

            rm -rf .next
            npm install
            npm run build

            cd ..

            echo "♻️ Reloading PM2 (zero downtime)..."
            pm2 reload socialsync-frontend || pm2 restart socialsync-frontend

            echo "⏳ Waiting for app..."
            sleep 5

            echo "🩺 Health check..."

            if ! curl -fsS http://localhost:3000 > /dev/null; then
              echo "❌ Frontend failed!"

              echo "🔴 Rolling back..."
              git reset --hard $PREV_COMMIT

              cd frontend
              npm install
              npm run build
              cd ..

              pm2 reload socialsync-frontend || pm2 restart socialsync-frontend

              echo "✅ Rollback done"
              exit 1
            fi

            echo "💾 Saving PM2..."
            pm2 save

            echo "===================================="
            echo "✅ DEPLOY SUCCESS"
            echo "===================================="