name: Deploy (Backend + Frontend)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          PUBLIC_FRONTEND_URL: ${{ secrets.PUBLIC_FRONTEND_URL }}
        run: |
          set -euo pipefail

          if [ -z "${SERVER_HOST:-}" ] || [ -z "${SERVER_USER:-}" ] || [ -z "${SERVER_SSH_KEY:-}" ]; then
            echo "SERVER_HOST, SERVER_USER, and SERVER_SSH_KEY secrets are required."
            exit 1
          fi

          SSH_PORT="${SERVER_PORT:-22}"
          TARGET_COMMIT="${GITHUB_SHA}"
          PUBLIC_FRONTEND_URL="${PUBLIC_FRONTEND_URL:-https://connect.snapkey.in}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/socialsync_deploy_key
          chmod 600 ~/.ssh/socialsync_deploy_key
          ssh-keygen -y -f ~/.ssh/socialsync_deploy_key >/dev/null

          echo "Testing SSH connection to $SERVER_USER@$SERVER_HOST:$SSH_PORT..."
          ssh \
            -i ~/.ssh/socialsync_deploy_key \
            -p "$SSH_PORT" \
            -o StrictHostKeyChecking=accept-new \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            "$SERVER_USER@$SERVER_HOST" \
            'echo "SSH OK: $(hostname)"'

          ssh \
            -i ~/.ssh/socialsync_deploy_key \
            -p "$SSH_PORT" \
            -o StrictHostKeyChecking=accept-new \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            "$SERVER_USER@$SERVER_HOST" \
            "TARGET_COMMIT=$TARGET_COMMIT bash -s" <<'REMOTE_SCRIPT'
          set -e

          echo "===================================="
          echo "DEPLOY STARTED"
          echo "===================================="

          cd ~/Connect

          restart_backend_services() {
            echo "Ensuring database and Redis are running..."
            docker compose up -d db redis

            echo "Building backend images..."
            docker compose build backend worker beat

            echo "Running database migrations in backend container..."
            docker compose run --rm -e RUN_MIGRATIONS=false backend uv run alembic upgrade head

            echo "Starting backend services..."
            docker compose up -d backend worker beat
          }

          restart_frontend_service() {
            echo "Restarting frontend from ~/Connect/frontend..."
            pm2 delete socialsync-frontend >/dev/null 2>&1 || true
            if command -v fuser >/dev/null 2>&1; then
              fuser -k 3000/tcp >/dev/null 2>&1 || true
            fi
            cd ~/Connect/frontend
            PORT=3000 pm2 start npm --name socialsync-frontend -- start
            cd ~/Connect
          }

          build_frontend_release() {
            echo "Building frontend in isolated release directory..."
            cd ~
            rm -rf Connect_frontend_release
            cp -R ~/Connect/frontend ~/Connect_frontend_release
            cd ~/Connect_frontend_release

            load_frontend_env
            rm -rf .next
            mkdir -p public
            printf '%s\n' "$CURRENT_COMMIT" > public/deploy-version.txt
            npm ci
            npm run build

            cd ~/Connect
          }

          promote_frontend_release() {
            echo "Promoting isolated frontend build..."
            rm -rf ~/Connect/frontend/.next_previous
            if [ -d ~/Connect/frontend/.next ]; then
              mv ~/Connect/frontend/.next ~/Connect/frontend/.next_previous
            fi
            cp -R ~/Connect_frontend_release/.next ~/Connect/frontend/.next
            mkdir -p ~/Connect/frontend/public
            cp ~/Connect_frontend_release/public/deploy-version.txt ~/Connect/frontend/public/deploy-version.txt
            rm -rf ~/Connect_frontend_release
          }

          load_frontend_env() {
            FRONTEND_ENV_FILE=""
            if [ -f ~/Connect/frontend/.env.production.local ]; then
              FRONTEND_ENV_FILE=~/Connect/frontend/.env.production.local
            elif [ -f ~/Connect/frontend/.env.production ]; then
              FRONTEND_ENV_FILE=~/Connect/frontend/.env.production
            elif [ -f ~/Connect/frontend/.env.local ]; then
              FRONTEND_ENV_FILE=~/Connect/frontend/.env.local
            fi

            if [ -z "$FRONTEND_ENV_FILE" ]; then
              echo "Frontend env file not found. Expected frontend/.env.production.local, frontend/.env.production, or frontend/.env.local"
              return 1
            fi

            echo "Loading frontend env from $FRONTEND_ENV_FILE"
            set -a
            . "$FRONTEND_ENV_FILE"
            set +a

            if [ -z "${NEXT_PUBLIC_API_BASE_URL:-}" ]; then
              echo "NEXT_PUBLIC_API_BASE_URL is required for frontend production builds."
              return 1
            fi

            if [ -z "${NEXT_PUBLIC_TENANT_ID:-}" ]; then
              echo "NEXT_PUBLIC_TENANT_ID is required for frontend production builds."
              return 1
            fi
          }

          rollback_deploy() {
            echo "Rolling back to $PREV_COMMIT..."
            git reset --hard "$PREV_COMMIT"
            CURRENT_COMMIT=$(git rev-parse HEAD)

            echo "Restoring backend containers..."
            restart_backend_services

            echo "Rebuilding frontend from previous commit..."
            build_frontend_release
            promote_frontend_release

            restart_frontend_service
            pm2 save
            echo "Rollback done"
          }

          echo "Saving current commit..."
          PREV_COMMIT=$(git rev-parse HEAD)
          echo "Previous: $PREV_COMMIT"

          echo "Pull latest code..."
          echo "Target: $TARGET_COMMIT"
          git fetch origin main
          git reset --hard "$TARGET_COMMIT"
          CURRENT_COMMIT=$(git rev-parse HEAD)
          echo "Current: $CURRENT_COMMIT"
          if [ "$CURRENT_COMMIT" != "$TARGET_COMMIT" ]; then
            echo "Server checkout mismatch. Expected $TARGET_COMMIT but got $CURRENT_COMMIT"
            exit 1
          fi

          echo "Preparing backend environment..."
          if [ -f "$HOME/.cargo/env" ]; then
            . "$HOME/.cargo/env"
          fi
          if [ -f "$HOME/.local/bin/env" ]; then
            . "$HOME/.local/bin/env"
          fi

          if ! command -v docker >/dev/null 2>&1; then
            echo "docker is not installed on the server."
            exit 1
          fi

          if ! docker compose version >/dev/null 2>&1; then
            echo "docker compose is not available on the server."
            exit 1
          fi

          restart_backend_services

          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/api/v1/health >/dev/null; then
              echo "Backend is healthy"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Backend failed health check"
              docker compose logs backend --tail 80 || true
              rollback_deploy
              exit 1
            fi
            sleep 2
          done

          echo "Building frontend..."
          build_frontend_release
          promote_frontend_release

          restart_frontend_service

          echo "Waiting for frontend..."
          sleep 5

          echo "Running health checks..."
          if ! curl -fsS http://127.0.0.1:3000 > /dev/null; then
            echo "Frontend failed!"
            rollback_deploy
            exit 1
          fi

          DEPLOYED_COMMIT=$(curl -fsS http://127.0.0.1:3000/deploy-version.txt || true)
          if [ "$DEPLOYED_COMMIT" != "$CURRENT_COMMIT" ]; then
            echo "Frontend commit mismatch. Expected $CURRENT_COMMIT but frontend served $DEPLOYED_COMMIT"
            rollback_deploy
            exit 1
          fi

          echo "Saving PM2..."
          pm2 save

          echo "===================================="
          echo "DEPLOY SUCCESS"
          echo "===================================="
          REMOTE_SCRIPT

          echo "Checking public frontend at $PUBLIC_FRONTEND_URL..."
          for i in $(seq 1 24); do
            DEPLOYED_PUBLIC_COMMIT=$(curl -fsS "$PUBLIC_FRONTEND_URL/deploy-version.txt" || true)
            if [ "$DEPLOYED_PUBLIC_COMMIT" = "$TARGET_COMMIT" ]; then
              echo "Public frontend is serving $DEPLOYED_PUBLIC_COMMIT"
              exit 0
            fi
            echo "Waiting for public frontend commit $TARGET_COMMIT... ($i/24, got: ${DEPLOYED_PUBLIC_COMMIT:-none})"
            sleep 5
          done

          echo "Public frontend did not update to $TARGET_COMMIT."
          echo "Check that SERVER_HOST points to the instance behind connect.snapkey.in, or configure PUBLIC_FRONTEND_URL if the domain changed."
          exit 1
