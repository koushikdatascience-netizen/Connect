name: Deploy to Linux Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Frontend via SSH
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Start Deployment
        run: echo "Starting deployment to server..."

      - name: 🔐 Deploy using SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22

          script: |
            set -e

            echo "===================================="
            echo "🚀 DEPLOYMENT STARTED"
            echo "===================================="

            # Navigate to project
            cd /home/ubuntu/SocialSyncV1/frontend

            echo "📂 Current directory:"
            pwd

            echo "📥 Pulling latest code..."
            git fetch origin
            git reset --hard origin/main

            echo "📦 Installing dependencies..."
            npm install

            echo "🏗 Building Next.js app..."
            npm run build

            echo "♻️ Restarting app with PM2..."
            pm2 reload socialsync-frontend || pm2 start npm --name "socialsync-frontend" -- start

            echo "📊 PM2 Status:"
            pm2 list

            echo "===================================="
            echo "✅ DEPLOYMENT SUCCESSFUL"
            echo "===================================="

      - name: 🌐 Verify Deployment
        run: |
          echo "Checking if app is responding..."

          sleep 10

          if curl -sSf http://${{ secrets.SSH_HOST }}:3000 > /dev/null; then
            echo "✅ App is live!"
          else
            echo "❌ App is not responding"
            exit 1
          fi

      - name: 🎉 Done
        run: echo "Deployment workflow completed successfully!"