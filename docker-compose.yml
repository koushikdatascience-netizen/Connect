services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: socialsync_backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
    command:
      - ./docker-entrypoint.sh
      - uv
      - run
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: socialsync_worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - .:/app
    command:
      - ./wait-for-db.sh
      - uv
      - run
      - celery
      - -A
      - app.worker.celery_app.celery_app
      - worker
      - --loglevel=info
      - -E
      - -Q
      - default

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: socialsync_beat
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - .:/app
    command:
      - ./wait-for-db.sh
      - uv
      - run
      - celery
      - -A
      - app.worker.celery_app.celery_app
      - beat
      - --loglevel=info

  redis:
    image: redis:7-alpine
    container_name: socialsync_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  db:
    image: postgres:16-alpine
    container_name: socialsync_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: socialsync
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  
