services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: socialsync_backend
    restart: always
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command:
      - sh
      - ./docker-entrypoint.sh
      - uv
      - run
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: socialsync_worker
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - .:/app
    command:
      - sh
      - ./wait-for-db.sh
      - uv
      - run
      - celery
      - -A
      - app.worker.celery_app.celery_app
      - worker
      - --loglevel=info
      - -E
      - -Q
      - default

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: socialsync_beat
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - .:/app
    command:
      - sh
      - ./wait-for-db.sh
      - uv
      - run
      - celery
      - -A
      - app.worker.celery_app.celery_app
      - beat
      - --loglevel=info

  redis:
    image: redis:7-alpine
    container_name: socialsync_redis
    restart: always
    env_file: .env
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --protected-mode no --requirepass "$$REDIS_PASSWORD"
        fi
        exec redis-server --appendonly yes --protected-mode no
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG
          else
            redis-cli ping | grep PONG
          fi
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db:
    image: postgres:16-alpine
    container_name: socialsync_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: socialsync
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  
